<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="description" content="ElektroWindows - WebOS">
    <meta name="keywords" content="ElektroWindows">
    <meta name="author" content="ElektroWindows">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<img src="w7.jpg" class="wallpaper">

<div class="deskicon">
    <div class="icon" data-target="window1">
        <img src="ie.png">
        <span>Internet Explorer</span>
    </div>
    <div class="icon">
        <img src="start.png">
        <span>Start menu</span>
    </div>
</div>

<div class="window" id="window1">
    <div class="window-title">
        <span>C:\Windows\System32\whoami.exe</span>
        <div class="window-buttons">
            <button class="btn-maximize">□</button>
            <button class="btn-close">x</button>
        </div>
    </div>
    <div class="window-content">elektrowindows</div>
</div>

<div class="bottombar">
    <img src="start.png" class="start-btn">
    <div class="separator"></div>
    <img src="ie.png" class="app-btn">
</div>

<script>
    function initWindow(win) {
        const titleBar = win.querySelector('.window-title');
        const btnMax = win.querySelector('.btn-maximize');
        const btnClose = win.querySelector('.btn-close');

        let isMoving = false, offX = 0, offY = 0, maximized = false, prev={};

        titleBar.addEventListener('mousedown', e => {
            if (e.target.closest('.window-buttons')) return;
            isMoving = true;
            offX = e.clientX - win.offsetLeft;
            offY = e.clientY - win.offsetTop;
            win.style.zIndex = 1000;
            document.onmousemove = ev => {
                if (isMoving && !maximized) {
                    win.style.left = (ev.clientX - offX) + 'px';
                    win.style.top = (ev.clientY - offY) + 'px';
                }
            };
            document.onmouseup = () => { isMoving = false; document.onmousemove = null; document.onmouseup = null;};
        });

        btnMax?.addEventListener('click', () => {
            if (!maximized) {
                prev = { left: win.style.left || win.offsetLeft + 'px', top: win.style.top || win.offsetTop + 'px', width: win.style.width, height: win.style.height };
                Object.assign(win.style, { left: '0', top: '0', width: '100%', height: '100%'});
                maximized = true;
            } else {
                Object.assign(win.style, { left: prev.left, top: prev.top, with: prev.width, height: prev.height })
                maximized = false;
            }
        });

        btnClose?.addEventListener('click', () => win.remove());
    }

    function createWindow(id, title = 'Nuova finestra', content = '') {
        const win = document.createElement('div');
        win.className = 'window';
        win.id = id;
        win.style.left = '120px';
        win.style.top = '120px';
        win.innerHTML = `
            <div class="window-title">
                <span>${title}</span>
                <div class="window-buttons">
                    <button class="btn-maximize">□</button>
                    <button class="btn-close">X</button>
                </div>
            </div>
            <div class="window-content">${content}</div>
        `;
        document.body.appendChild(win);
        initWindow(win);
        return win;
    }

    const windows = document.querySelectorAll('.window');

    document.addEventListener('DOMContentLoaded', () => {
        console.log('icons:', document.querySelectorAll('.icon'),length, 'windows:', document.querySelectorAll('.window').length)

        document.querySelectorAll('.icon').forEach(icon => {
            icon.addEventListener('dblclick', () => {
                const targetId = (icon.dataset.target || `window-${Date.now()}`).trim();
                let winEl = document.getElementById(targetId);
                if (!winEl) {
                    const title = icon.querySelector('span')?.textContent || targetId;
                    winEl = createWindow(targetId, title, 'Contenuto di ' + title);
                }
                winEl.style.display = 'block';
                winEl.style.zIndex = 1000;
            });
        });
    });

    windows.forEach((win, index) => {
        const titleBar = win.querySelector('.window-title');
        const btnMaximize = win.querySelector('.btn-maximize');
        const btnClose = win.querySelector('.btn-close');

        //id univoko 4 window
        //const windowId = `window-${index}`;
        //win.id = windowId;

        let isMoving = false;
        let offsetX = 0, offsetY = 0;
        let isMaximized = false;
        let previousState = {}
        let taskbarIcon = null;

        function createTaskbarIcon() {
            if (taskbarIcon) return; // se esiste non duplicare
            taskbarIcon = document.createElement('img');
            taskbarIcon.src = 'ie.png'; // 4 every win set an icon
            taskbarIcon.className = 'taskbar-app-btn';
            taskbarIcon.title = titleBar.querySelector('span').textContent;

            taskbarIcon.addEventListener('click', () => {
                win.style.display = 'block';
                win.style.zIndex = 100;
                taskbarIcon.remove();
                taskbarIcon = null;
            });

            taskbar.appenChild(taskbarIcon);
        }

        //dragga
        titleBar.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('.window-buttons') ||
                e.target.classList.contains('btn-maximize') ||
                e.target.classList.contains('.btn-close')) {
                    return;
                }
                isMoving = true;
                offsetX = e.clientX - win.offsetLeft;
                offsetY = e.clientY - win.offsetTop;
                win.style.zIndex = 100;
        });

        document.addEventListener('mousemove', (e) => {
            if (isMoving && !isMaximized) {
                win.style.left = (e.clientX - offsetX) + 'px';
                win.style.top = (e.clientY - offsetY) + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isMoving = false;
        });

        //mxmz and restore
        btnMaximize.addEventListener('click', () => {
            if (!isMaximized) {
                previousState = {
                    left: win.style.left,
                    top: win.style.top,
                    width: win.style.width,
                    height: win.style.height
                };
                win.style.left = '0';
                win.style.top = '0';
                win.style.width = '100%'
                win.style.height = '100%';
                isMaximized = true;
            } else {
                win.style.left = previousState.left;
                win.style.top = previousState.top;
                win.style.width = previousState.width;
                win.style.height = previousState.height;
                isMaximized = false;
            }
        });

        //close
        btnClose.addEventListener('click', () => {
            if (taskbarIcon) {
                taskbarIcon.remove();
                taskbarIcon = null;
            }
            win.remove();
        });
    });
</script>
</html>
